name: TransIQ CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8 mypy
          pip install -e .

      - name: Lint with flake8
        run: |
          flake8 transiq/ tests/ --max-line-length=120 --count --show-source --statistics

      - name: Type-check with mypy
        run: |
          mypy transiq/ --ignore-missing-imports

      - name: Run tests
        run: |
          pytest tests/test_statistics.py tests/test_process_capability.py tests/test_spc_charts.py tests/test_hypothesis.py tests/test_regression.py tests/test_doe.py tests/test_msa.py tests/test_lean_tools.py tests/test_fmea.py tests/test_voc.py tests/test_dashboard.py -v --tb=short
