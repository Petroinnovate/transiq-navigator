<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6fa8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d3d6b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Left J shape -->
  <path d="M 30 30 L 55 30 L 55 130 Q 55 165 30 165 Q 10 165 10 148 L 10 140 L 25 140 Q 25 150 32 150 Q 40 150 40 130 L 40 45 L 30 45 Z" fill="url(#blueGrad)"/>

  <!-- Right T / upside-down U shape -->
  <path d="M 145 30 L 170 30 L 170 45 L 160 45 L 160 130 Q 160 150 168 150 Q 175 150 175 140 L 175 140 L 190 140 L 190 148 Q 190 165 170 165 Q 145 165 145 130 L 145 45 L 135 45 L 135 30 Z" fill="url(#blueGrad)"/>

  <!-- Oil rig tower: vertical mast -->
  <rect x="97" y="40" width="6" height="90" fill="#1a5276"/>

  <!-- Rig cross beams -->
  <line x1="85" y1="130" x2="115" y2="130" stroke="#1a5276" stroke-width="5"/>
  <line x1="88" y1="110" x2="112" y2="110" stroke="#1a5276" stroke-width="3"/>
  <line x1="91" y1="90"  x2="109" y2="90"  stroke="#1a5276" stroke-width="3"/>
  <line x1="93" y1="70"  x2="107" y2="70"  stroke="#1a5276" stroke-width="3"/>
  <line x1="95" y1="55"  x2="105" y2="55"  stroke="#1a5276" stroke-width="2"/>

  <!-- Rig legs (A-frame) -->
  <line x1="100" y1="40" x2="82"  y2="130" stroke="#1a5276" stroke-width="4"/>
  <line x1="100" y1="40" x2="118" y2="130" stroke="#1a5276" stroke-width="4"/>

  <!-- Hook at bottom of rig -->
  <path d="M 95 130 Q 100 142 105 130" stroke="#1a5276" stroke-width="3" fill="none"/>

  <!-- PetroInnovate text -->
  <text x="100" y="183" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#0d3d6b" letter-spacing="0.5">PetroInnovate</text>
</svg>
